services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bytebrew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bytebrew}
      POSTGRES_DB: ${POSTGRES_DB:-bytebrew}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bytebrew}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mcp-server:
    build: ./mcp-server
    # Stdio MCP server -- engine connects to it via the config.
    # This service just needs to stay alive; the engine spawns
    # the actual process via stdio transport.
    # We build it here so the binary is available inside the engine container.
    volumes:
      - mcp-bin:/opt/mcp

  engine:
    image: bytebrew/engine:latest
    ports:
      - "8443:8443"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bytebrew}:${POSTGRES_PASSWORD:-bytebrew}@db:5432/${POSTGRES_DB:-bytebrew}?sslmode=disable"
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    volumes:
      - ./config/agents.yaml:/etc/bytebrew/agents.yaml:ro
      - ./scripts/seed-config.sh:/docker-entrypoint.d/seed-config.sh:ro
      - mcp-bin:/opt/mcp:ro
    depends_on:
      db:
        condition: service_healthy
      mcp-server:
        condition: service_completed_successfully

volumes:
  pgdata:
  mcp-bin:
