services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bytebrew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bytebrew}
      POSTGRES_DB: ${POSTGRES_DB:-bytebrew}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bytebrew}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mcp-server:
    build: ./mcp-server
    volumes:
      - mcp-bin:/opt/mcp

  engine:
    image: bytebrew/engine:latest
    ports:
      - "8443:8443"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bytebrew}:${POSTGRES_PASSWORD:-bytebrew}@db:5432/${POSTGRES_DB:-bytebrew}?sslmode=disable"
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      BYTEBREW_AUTH_MODE: ${BYTEBREW_AUTH_MODE:-local}
      BYTEBREW_JWT_KEYS_DIR: ${BYTEBREW_JWT_KEYS_DIR:-/var/lib/bytebrew/keys}
    volumes:
      - ./config/agents.yaml:/etc/bytebrew/agents.yaml:ro
      - ./config/knowledge:/etc/bytebrew/knowledge:ro
      - ./scripts/seed-config.sh:/docker-entrypoint.d/seed-config.sh:ro
      - mcp-bin:/opt/mcp:ro
      - engine-keys:/var/lib/bytebrew/keys
    depends_on:
      db:
        condition: service_healthy
      mcp-server:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8443/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web-client:
    image: bytebrew/web-client:latest
    ports:
      - "3000:80"
    environment:
      API_URL: http://engine:8443
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  mcp-bin:
  engine-keys:
