services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bytebrew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bytebrew}
      POSTGRES_DB: ${POSTGRES_DB:-bytebrew}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bytebrew}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mcp-server:
    build: ./mcp-server
    volumes:
      - mcp-bin:/opt/mcp

  engine:
    image: bytebrew/engine:latest
    ports:
      - "8443:8443"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bytebrew}:${POSTGRES_PASSWORD:-bytebrew}@db:5432/${POSTGRES_DB:-bytebrew}?sslmode=disable"
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-example-jwt-secret}
    volumes:
      - ./config/agents.yaml:/etc/bytebrew/agents.yaml:ro
      - ./scripts/seed.sh:/docker-entrypoint.d/seed-config.sh:ro
      - mcp-bin:/opt/mcp:ro
    depends_on:
      db:
        condition: service_healthy
      mcp-server:
        condition: service_completed_successfully

  service:
    build: ./service
    ports:
      - "3000:3000"
    environment:
      ENGINE_URL: http://engine:8443
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-example-jwt-secret}
      PORT: "3000"
    depends_on:
      - engine

volumes:
  pgdata:
  mcp-bin:
